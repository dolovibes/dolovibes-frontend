  <!-- Critical CSS - Inline para first paint más rápido -->
  <style>
    /* Variables críticas */
    :root {
      --color-grafito: #1C1C1C;
      --color-pizarra: #374257;
      --color-nieve: #EFEFE6;
      --color-niebla: #A3B5B6;
    }
    
    /* Reset básico crítico */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    /* Body crítico para evitar FOUC */
    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--color-nieve);
      color: var(--color-grafito);
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Prevenir layout shifts críticos */
    img, video {
      max-width: 100%;
      height: auto;
      display: block;
    }
    
    /* Hero crítico - above the fold - LCP optimizado */
    #root {
      min-height: 100vh;
      background-color: var(--color-pizarra);
    }
    
    /* Texto hero visible inmediatamente */
    .bg-pizarra {
      background-color: #374257 !important;
    }
    
    /* Asegurar que el texto sea el LCP, no el video */
    h1 {
      color: white;
    }
